name: ArtixPractice
main: dev.artixdev.practice.Main
version: 22.9
author: Faastyzin
description: A feature-rich and well optimized Practice Core
#api-version: "1.13"
website: https://github.com/PotDevxs/ArtixPractice

permissions:
  artixpractice.use:
    description: Allows use of basic practice commands
    default: true
  artixpractice.admin:
    description: Allows use of admin commands
    default: op
  artixpractice.arena.create:
    description: Allows creation of arenas
    default: op
  artixpractice.arena.delete:
    description: Allows deletion of arenas
    default: op
  artixpractice.arena.edit:
    description: Allows editing of arenas
    default: op
  artixpractice.bot.spawn:
    description: Allows spawning of bots
    default: op
  artixpractice.bot.remove:
    description: Allows removal of bots
    default: op
  artixpractice.reload:
    description: Allows reloading the plugin
    default: op
  artixpractice.license: # Não toque, sei bem oque você quer aqui kk se fizer isto terá consequências...
    description: Allows configuring and validating Artix license (config.yml License)
    default: op
  artix.holo.admin:
    description: Hologram create/delete/list/move/update
    default: op
  artix.bot.knockback:
    description: Bot knockback profile management
    default: op
  artix.config:
    description: Config reload/validate/info
    default: op
  artix.animatedtitle:
    description: Animated scoreboard title
    default: op
  artix.command.postmatch:
    description: Open post-match inventory
    default: op
  artix.profile.silent:
    description: Silent queue/party (no messages)
    default: op
  artix.admin:
    description: Practice admin (e.g. reload)
    default: op
  artix.queue.admin:
    description: Queue admin (add/remove/clear)
    default: op
  practice.kit.*:
    description: Use specific kit (practice.kit.<kitname>)
    default: true
  practice.projectile.launch:
    description: Launch projectiles in practice
    default: true
  practice.team.large:
    description: Create larger parties
    default: op
  artix.kit.ranked:
    description: Access ranked kits
    default: true
  artix.kit.tournament:
    description: Access tournament kits
    default: op
  artix.kit.custom:
    description: Access custom kits
    default: op
  artix.kit.event:
    description: Access event kits
    default: op

softdepend:
  - Citizens
  - FastAsyncWorldEdit
  - ProtocolLib
  - Apollo-Bukkit
  - ProtocolSupport
  - ViaVersion
  - ViaBackwards
  - ViaRewind
  - WorldEdit
  - HolographicDisplays
  - PlaceholderAPI
  - KarhuLoader
