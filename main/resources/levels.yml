# Cores por faixa de nível (usado em scoreboard, nametag, etc.)
# Formato: "min-max": "código_cor"  (ex: &7 = cinza, &a = verde, &e = amarelo, &c = vermelho)
LEVEL_COLORS:
  "1-20": "&7"      # Cinza - Iniciante
  "21-40": "&f"     # Branco
  "41-60": "&a"     # Verde
  "61-80": "&e"     # Amarelo
  "81-100": "&6"    # Ouro
  "101-120": "&d"   # Rosa claro
  "121-140": "&b"   # Ciano
  "141-160": "&9"   # Azul
  "161-180": "&5"   # Roxo
  "181-200": "&c"   # Vermelho - Máximo
